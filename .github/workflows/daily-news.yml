name: Daily News Brief

on:
  schedule:
    # 每天两次；GitHub cron 使用 UTC。真正是否执行由 --respect-schedule 守卫判定，
    # 守卫按 config.yaml 的 schedules（北京 09:20 / 纽约 09:20）匹配，自动处理夏令时。
    - cron: "20 1 * * *"    # 北京时间 09:20（UTC+8，无夏令时）
    - cron: "20 13 * * *"   # 纽约时间 09:20（EDT 夏令时 = UTC-4）
    - cron: "20 14 * * *"   # 纽约时间 09:20（EST 冬令时 = UTC-5）
  workflow_dispatch: {}     # 手动触发（手动时无视守卫，直接执行）

permissions:
  contents: read

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # LLM 供应商切换：在仓库 Variables 里设 LLM_PROVIDER=deepseek 即可切到 DeepSeek
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'gemini' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_SUBJECT_PREFIX: ${{ vars.MAIL_SUBJECT_PREFIX || '每日外媒新闻简报' }}
      RUN_MODE: once
      LOG_LEVEL: INFO
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 用 cache 在多次运行间保留去重记录，确保两次推送内容不重复
      - name: Restore dedup state
        uses: actions/cache@v4
        with:
          path: data
          key: dedup-${{ github.run_id }}
          restore-keys: |
            dedup-

      # 定时触发：经守卫，只有落在北京/纽约 09:20 窗口的那条 cron 才真正执行
      - name: Run (scheduled, guarded)
        if: github.event_name == 'schedule'
        run: python run.py --respect-schedule

      # 手动触发：直接执行，方便随时验证
      - name: Run (manual)
        if: github.event_name == 'workflow_dispatch'
        run: python run.py

