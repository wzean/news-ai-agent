name: Daily News Brief

on:
  # 定时由 cron-job.org 准点触发 workflow_dispatch（比 GitHub 自带 schedule 准时）。
  # 已移除 GitHub schedule，避免与 cron-job.org 重复触发导致早晚各发两条。
  workflow_dispatch: {}     # 手动 / 外部准点触发

permissions:
  contents: read

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # LLM 供应商切换：在仓库 Variables 里设 LLM_PROVIDER=deepseek 即可切到 DeepSeek
      LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'gemini' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_SUBJECT_PREFIX: ${{ vars.MAIL_SUBJECT_PREFIX || '每日外媒新闻简报' }}
      RUN_MODE: once
      LOG_LEVEL: INFO
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 用 cache 在多次运行间保留去重记录，确保两次推送内容不重复
      - name: Restore dedup state
        uses: actions/cache@v4
        with:
          path: data
          key: dedup-${{ github.run_id }}
          restore-keys: |
            dedup-

      # 由 cron-job.org 准点触发（workflow_dispatch）：直接执行发送
      - name: Run
        run: python run.py

